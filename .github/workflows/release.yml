name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  ci:
    name: Run CI before release
    uses: ./.github/workflows/ci.yml

  build-binaries:
    name: Build binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: ci
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: dockerwiz-linux-x64
          - os: macos-latest
            artifact: dockerwiz-darwin-arm64
          - os: windows-latest
            artifact: dockerwiz-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -e .

      - name: Build binary
        run: pyinstaller --onefile --name ${{ matrix.artifact }} dockerwiz/cli.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}*

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: ci
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hatch
        run: pip install hatch

      - name: Build package
        run: hatch build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, publish-pypi]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/**/*
